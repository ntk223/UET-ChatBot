version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - ask_admission
  - inform_major
  - inform_method
  - ask_tuition
  - confirm_suitable
  - ask_career
  - ask_higher_edu
  - restart
  - nlu_fallback
  - uet_info
  - xet_hocba
  - xet_ket_hop
  - ask_detailed_major
  - hoi_quy_doi_ielts
  - hoi_cong_diem_thuong
  - hoi_thu_tuc_nop_hs
  - hoi_chinh_sach_hsa
  - hoi_dieu_kien_phu
  - hoi_diem_chuan_nganh
  - hoi_chi_tieu_nganh
  - hoi_tu_van_nganh
  - hoi_co_hoi_viec_lam_nganh
  - hoi_thong_tin_khac_ve_nganh

entities:
  - major
  - admission_method
  - block
  - gpa
  - ielts
  - subject
  - bonus_type

slots:
  major:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: major
  admission_method:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: admission_method
  selected_major:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: major
      - type: from_text
        conditions:
          - active_loop: hocba_admission_form
            requested_slot: selected_major
          - active_loop: combined_admission_form
            requested_slot: selected_major
  selected_block:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: block
      - type: from_text
        conditions:
          - active_loop: hocba_admission_form
            requested_slot: selected_block
  gpa_score:
    type: float
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: gpa
      - type: from_text
        conditions:
          - active_loop: hocba_admission_form
            requested_slot: gpa_score
          - active_loop: combined_admission_form
            requested_slot: gpa_score
  transcript_file:
    type: text
    influence_conversation: true
    mappings:
      - type: from_text
        conditions:
          - active_loop: hocba_admission_form
            requested_slot: transcript_file
          - active_loop: combined_admission_form
            requested_slot: transcript_file
  ielts_score:
    type: float
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: ielts
      - type: from_text
        conditions:
          - active_loop: combined_admission_form
            requested_slot: ielts_score
  ielts_file:
    type: text
    influence_conversation: true
    mappings:
      - type: from_text
        conditions:
          - active_loop: combined_admission_form
            requested_slot: ielts_file
  candidate_name:
    type: text
    influence_conversation: true
    mappings:
      - type: from_text
        conditions:
          - active_loop: personal_info_form
            requested_slot: candidate_name
  candidate_phone:
    type: text
    influence_conversation: true
    mappings:
      - type: from_text
        conditions:
          - active_loop: personal_info_form
            requested_slot: candidate_phone
  candidate_email:
    type: text
    influence_conversation: true
    mappings:
      - type: from_text
        conditions:
          - active_loop: personal_info_form
            requested_slot: candidate_email

forms:
  admission_form:
    required_slots:
      - major
      - admission_method
  tuition_form:
    required_slots:
      - major
  hocba_admission_form:
    required_slots:
      - selected_major
      - selected_block
      - gpa_score
      - transcript_file
  combined_admission_form:
    required_slots:
      - selected_major
      - ielts_score
      - gpa_score
      - ielts_file
      - transcript_file
  personal_info_form:
    required_slots:
      - candidate_name
      - candidate_phone
      - candidate_email

responses:
  utter_greet_and_start:
    - text: "Chào bạn, mình là trợ lý tư vấn tuyển sinh UET. Bạn muốn tìm hiểu ngành học hay thông tin tuyển sinh?"
      buttons:
        - title: "Tư vấn tuyển sinh 📝"
          payload: "/ask_admission"
        - title: "Tìm hiểu về UET 🏫"
          payload: "/uet_info"

  utter_ask_major:
    - text: "Bạn quan tâm ngành nào? Hãy chọn bên dưới để mình tư vấn chính xác."
      buttons:
        - title: "Khoa học máy tính"
          payload: "/inform_major{\"major\": \"CN8\"}"
        - title: "Công nghệ thông tin"
          payload: "/inform_major{\"major\": \"CN1\"}"

  utter_ask_admission_method:
    - text: "Bạn muốn tra cứu theo phương thức xét tuyển nào?"
      buttons:
        - title: "Điểm thi THPTQG"
          payload: "/inform_method{\"admission_method\": \"THPTQG\"}"
        - title: "Đánh giá năng lực"
          payload: "/inform_method{\"admission_method\": \"DGNL\"}"
        - title: "IELTS / SAT"
          payload: "/inform_method{\"admission_method\": \"IELTS\"}"

  utter_provide_score_info:
    - text: "Mình đã nhận yêu cầu tra cứu điểm chuẩn và sẽ phản hồi chi tiết cho bạn."

  utter_provide_tuition_info:
    - text: "Mình đã nhận yêu cầu tra cứu học phí và sẽ phản hồi chi tiết cho bạn."

  utter_provide_curriculum:
    - text: "Mình gửi bạn tóm tắt chương trình đào tạo của ngành."

  utter_career_prospects:
    - text: "Sau khi tốt nghiệp, bạn có thể làm việc tại các vị trí sau."

  utter_higher_edu_info:
    - text: "Bạn có thể học tiếp thạc sĩ, nghiên cứu sinh hoặc các chứng chỉ quốc tế."

  utter_uet_info:
    - text: "UET là trường thành viên của ĐHQG Hà Nội, đào tạo và nghiên cứu trong lĩnh vực công nghệ thông tin và truyền thông."
      buttons:
        - title: "Tư vấn tuyển sinh"
          payload: "/ask_admission"
        - title: "Tìm hiểu ngành học"
          payload: "/inform_major"
        - title: "Học phí UET"
          payload: "/ask_tuition"

  utter_goodbye:
    - text: "Cảm ơn bạn, hẹn gặp lại."
      buttons:
        - title: "Bắt đầu lại cuộc trò chuyện"
          payload: "/restart"

  utter_fallback:
    - text: "Mình chưa hiểu rõ câu hỏi. Bạn vui lòng chọn một lựa chọn hoặc đặt câu hỏi cụ thể hơn."
      buttons:
        - title: "Tư vấn tuyển sinh"
          payload: "/ask_admission"
        - title: "Tìm hiểu ngành học"
          payload: "/inform_major"
        - title: "Xem thông tin UET"
          payload: "/uet_info"

  utter_default:
    - text: "Mình chưa hiểu rõ câu hỏi. Bạn vui lòng chọn một lựa chọn hoặc đặt câu hỏi cụ thể hơn."
      buttons:
        - title: "Tư vấn tuyển sinh"
          payload: "/ask_admission"
        - title: "Tìm hiểu ngành học"
          payload: "/inform_major"
        - title: "Xem thông tin UET"
          payload: "/uet_info"

  utter_ask_selected_major:
    - text: "Bạn muốn xét tuyển cho ngành học nào? Chọn các ngành phổ biến bên dưới hoặc nhập tên ngành khác:"
      buttons:
        - title: "Công nghệ thông tin"
          payload: "Công nghệ thông tin"
        - title: "Khoa học máy tính"
          payload: "Khoa học máy tính"
        - title: "Trí tuệ nhân tạo"
          payload: "Trí tuệ nhân tạo"
        - title: "Khoa học dữ liệu"
          payload: "Khoa học dữ liệu"
  utter_ask_selected_block:
    - text: "Vui lòng chọn tổ hợp môn/khối xét tuyển của bạn hoặc nhập khối khác:"
      buttons:
        - title: "A00 (Toán, Lý, Hóa)"
          payload: "A00"
        - title: "A01 (Toán, Lý, Anh)"
          payload: "A01"
        - title: "D01 (Toán, Văn, Anh)"
          payload: "D01"
        - title: "D07 (Toán, Hóa, Anh)"
          payload: "D07"
  utter_ask_gpa_score:
    - text: "Vui lòng nhập điểm trung bình học bạ của bạn (theo thang điểm 10 hoặc tổng 3 môn theo thang điểm 30):"
  utter_ask_transcript_file:
    - text: "Vui lòng đăng tải (upload) ảnh chụp/tệp tin học bạ của bạn (hoặc dán đường dẫn tệp):"
  utter_ask_ielts_score:
    - text: "Vui lòng nhập điểm IELTS của bạn (Ví dụ: 6.5, 7.0...):"
  utter_ask_ielts_file:
    - text: "Vui lòng đăng tải (upload) chứng chỉ IELTS của bạn (hoặc dán đường dẫn tệp):"
  utter_ask_candidate_name:
    - text: "Vui lòng nhập họ và tên của bạn để đăng ký tư vấn xét tuyển:"
  utter_ask_candidate_phone:
    - text: "Vui lòng nhập số điện thoại liên hệ của bạn:"
  utter_ask_candidate_email:
    - text: "Vui lòng nhập địa chỉ email của bạn:"

  utter_cancel_admission:
    - text: "Dạ vâng, nếu bạn cần thêm thông tin gì khác về UET, cứ hỏi mình nhé!"
      buttons:
        - title: "Tư vấn tuyển sinh"
          payload: "/ask_admission"
        - title: "Tìm hiểu ngành học"
          payload: "/inform_major"
        - title: "Xem thông tin UET"
          payload: "/uet_info"

  utter_hoi_quy_doi_ielts:
    - text: "Trường Đại học Công nghệ (UET) quy đổi điểm chứng chỉ tiếng Anh (IELTS Academic từ 5.5 trở lên) sang môn tiếng Anh để xét tuyển như sau:\n- IELTS 5.5 quy đổi thành 8.0 điểm, cộng khuyến khích 1.0\n- IELTS 6.0 quy đổi thành 8.5 điểm, cộng khuyến khích 1.0\n- IELTS 6.5 quy đổi thành 9.0 điểm, cộng khuyến khích 1.0\n- IELTS 7.0 quy đổi thành 9.5 điểm, cộng khuyến khích 1.25\n- IELTS 7.5 - 8.0 quy đổi thành 10.0 điểm, cộng khuyến khích 1.25\n- IELTS 8.5 - 9.0 quy đổi thành 10.0 điểm, cộng khuyến khích 1.5\nLưu ý: Chứng chỉ phải còn hạn 2 năm tính đến ngày xét tuyển, thi đầy đủ 4 kỹ năng (không chấp nhận thi online)."

  utter_hoi_cong_diem_thuong:
    - text: "Chính sách ưu tiên cộng điểm khuyến khích của UET áp dụng cho các thí sinh đạt giải học sinh giỏi (HSG) tỉnh/thành phố, HSG quốc gia, cuộc thi khoa học kỹ thuật (KHKT). Mức điểm cộng dao động theo giải thưởng, tối đa điểm cộng khuyến khích không vượt quá 10% tổng điểm thang 30. Việc cộng điểm được áp dụng khi xét tuyển theo phương thức kết quả THPT hoặc chứng chỉ quốc tế. Thí sinh tự do hoặc thi lại vẫn được hưởng chế độ này nếu có chứng chỉ hợp lệ."

  utter_hoi_thu_tuc_nop_hs:
    - text: "Quy trình nộp hồ sơ xét tuyển sớm tại UET:\n1. Đăng ký thông tin trực tuyến trên cổng tuyển sinh của UET.\n2. Tải bản sao công chứng học bạ và chứng chỉ tiếng Anh (IELTS/SAT/phần điểm HSA) lên hệ thống.\n3. Đối với thí sinh trúng tuyển sớm, bạn vẫn bắt buộc phải đăng ký nguyện vọng xét tuyển trên hệ thống tuyển sinh của Bộ GD&ĐT theo lịch trình chung."

  utter_hoi_chinh_sach_hsa:
    - text: "UET xét tuyển dựa trên kết quả thi Đánh giá năng lực (HSA) do ĐHQGHN tổ chức còn hạn trong vòng 2 năm. Thí sinh thi HSA cần đạt ngưỡng đảm bảo chất lượng đầu vào của ĐHQGHN và của UET. Thí sinh có thể chọn phần thi Khoa học tự nhiên hoặc phần thi khác tùy theo năng lực, tuy nhiên UET khuyến khích làm phần thi liên quan trực tiếp đến khoa học tự nhiên."

  utter_hoi_dieu_kien_phu:
    - text: "Ngưỡng đảm bảo chất lượng đầu vào (điểm sàn) cho phương thức xét điểm thi tốt nghiệp THPT 2026 là từ 15.00 điểm trở lên cho tổ hợp 3 môn. Đối với phương thức xét SAT hoặc HSA, thí sinh cũng cần đạt ngưỡng đầu vào do trường quy định. Ngoài ra, hạnh kiểm cấp 3 phải đạt từ Khá trở lên và điểm trung bình học bạ một số ngành có thể có yêu cầu phụ (ví dụ: trung bình 3 năm trên 8.0 đối với xét tuyển thẳng)."

  utter_hoi_diem_chuan_nganh:
    - text: "Điểm chuẩn các ngành hot tại UET năm 2025 dao động như sau:\n- Công nghệ thông tin (CN1): 28.19 điểm\n- Khoa học máy tính (CN8): 27.86 điểm\n- Trí tuệ nhân tạo (CN12): 27.75 điểm\n- Kỹ thuật điều khiển & Tự động hóa (CN11): 27.90 điểm\n- Khoa học dữ liệu (CN20): 27.38 điểm\nBạn có thể gõ trực tiếp tên ngành hoặc hỏi 'điểm chuẩn ngành...' để mình tra cứu chính xác điểm năm 2024 & 2025 từ cơ sở dữ liệu."

  utter_hoi_chi_tieu_nganh:
    - text: "Năm 2026, UET dự kiến tuyển sinh tổng cộng 4020 chỉ tiêu cho các ngành học. Một số ngành tiêu biểu:\n- Công nghệ kỹ thuật điện tử - viễn thông (CN9): 480 chỉ tiêu\n- Công nghệ thông tin (CN1): 460 chỉ tiêu\n- Khoa học máy tính (CN8) & Kỹ thuật máy tính (CN2): 400 chỉ tiêu\n- Trí tuệ nhân tạo (CN12): 320 chỉ tiêu\nĐể biết chỉ tiêu cụ thể từng ngành, bạn vui lòng nhập tên ngành học nhé!"

  utter_hoi_tu_van_nganh:
    - text: "UET đào tạo 20 ngành học phong phú từ CNTT, Vi điện tử, Vật lý kỹ thuật, Cơ điện tử đến Công nghệ sinh học & Nông nghiệp. Nếu bạn mạnh về môn Toán, Lý và Tư duy logic, các ngành như CNTT (CN1), Khoa học máy tính (CN8), Trí tuệ nhân tạo (CN12) hoặc Kỹ thuật máy tính (CN2 - thiết kế vi mạch) sẽ rất phù hợp. Bạn muốn được tư vấn cụ thể về ngành nào trong số này?"

  utter_hoi_co_hoi_viec_lam_nganh:
    - text: "Tỷ lệ sinh viên UET có việc làm sau khi tốt nghiệp đạt mức ấn tượng là 97%. Sinh viên tốt nghiệp có thể làm việc tại các tập đoàn lớn trong và ngoài nước (Samsung, Toshiba, Synopsys, Viettel, FPT) ở các vai trò: Lập trình viên Fullstack, Kỹ sư AI/Data, Kỹ sư thiết kế vi mạch bán dẫn, Kỹ sư Robot hay thiết kế phần cứng nhúng."

  utter_hoi_thong_tin_khac_ve_nganh:
    - text: "Nếu bạn có các thắc mắc khác về điều kiện sức khỏe ngành hàng không vũ trụ (CN7), việc nhập nhầm mã ngành, hoặc các tổ hợp thi mới như X06 (Toán, Lý, Tin), bạn có thể liên hệ trực tiếp với Hotline Phòng tuyển sinh UET để được hỗ trợ nhanh nhất."

actions:
  - action_fetch_score
  - action_fetch_tuition
  - action_check_suitability
  - action_explain_major_and_cta
  - action_eval_hocba_admission
  - action_eval_combined_admission
  - action_save_candidate_info
  - action_provide_detailed_major_info
  - action_cancel_hocba_admission
  - validate_hocba_admission_form
  - validate_combined_admission_form
  - validate_personal_info_form

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
