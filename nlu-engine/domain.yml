version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - ask_admission
  - inform_major
  - inform_method
  - ask_tuition
  - confirm_suitable
  - ask_career
  - ask_higher_edu
  - restart
  - nlu_fallback

entities:
  - major
  - admission_method

slots:
  major:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: major
  admission_method:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: admission_method

responses:
  utter_greet_and_start:
    - text: "Chao ban, minh la tro ly tu van tuyen sinh UET. Ban can tu van nganh hoc hay phuong thuc xet tuyen?"

  utter_ask_major:
    - text: "Ban quan tam nganh nao?"

  utter_ask_admission_method:
    - text: "Ban muon tra cuu theo phuong thuc xet tuyen nao?"

  utter_provide_score_info:
    - text: "Minh da nhan yeu cau tra cuu diem chuan. Backend se lay du lieu va phan hoi chi tiet cho ban."

  utter_provide_tuition_info:
    - text: "Minh da nhan yeu cau tra cuu hoc phi. Backend se lay du lieu va phan hoi chi tiet cho ban."

  utter_career_prospects:
    - text: "Ban co the hoi ve co hoi viec lam sau khi tot nghiep."

  utter_higher_edu_info:
    - text: "Ban co the hoc tiep theo huong thac si, nghien cuu hoac chung chi quoc te."

  utter_goodbye:
    - text: "Cam on ban, hen gap lai."

  utter_default:
    - text: "Minh chua hieu ro cau hoi. Ban thu hoi diem chuan hoac hoc phi cua mot nganh cu the nhe."

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
