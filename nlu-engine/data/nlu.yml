version: "3.1"
nlu:
  - intent: greet
    examples: |
      - xin chao
      - chao ban
      - hello
      - em can tu van tuyen sinh

  - intent: ask_admission
    examples: |
      - toi muon biet ve xet tuyen
      - cho em hoi ve xet tuyen
      - xet tuyen nhu the nao
      - dieu kien xet tuyen la gi

  - intent: inform_major
    examples: |
      - em chon nganh [Khoa hoc may tinh](major)
      - minh quan tam [khmt](major)
      - cho toi nganh [cong nghe thong tin](major)
      - [CNTT](major)

  - intent: inform_method
    examples: |
      - em xet theo [THPT](admission_method)
      - cho minh phuong thuc [DGNL](admission_method)
      - toi muon theo [IELTS](admission_method)
      - xet tuyen bang [SAT](admission_method)

  - intent: ask_tuition
    examples: |
      - hoc phi bao nhieu
      - nganh nay hoc phi the nao
      - cho em xin hoc phi
      - phi dao tao mot nam la bao nhieu

  - intent: confirm_suitable
    examples: |
      - em thay phu hop
      - duoc roi
      - on ban oi
      - em dong y

  - intent: ask_career
    examples: |
      - co hoi viec lam ra sao
      - hoc xong de xin viec khong
      - ra truong lam gi

  - intent: ask_higher_edu
    examples: |
      - co the hoc tiep khong
      - em muon hoc cao hoc
      - co huong hoc tiep nao

  - intent: affirm
    examples: |
      - co
      - dong y
      - tiep tuc
      - ok

  - intent: restart
    examples: |
      - bat dau lai
      - minh muon tu van lai tu dau
      - quay lai tu dau

  - intent: goodbye
    examples: |
      - tam biet
      - bye
      - cam on ban
      - hen gap lai

  - intent: nlu_fallback
    examples: |
      - asdfgh
      - ???
      - abc xyz

  - synonym: CN8
    examples: |
      - khmt
      - Khoa học máy tính
      - khoa hoc may tinh

  - synonym: CN1
    examples: |
      - IT
      - cntt
      - cong nghe thong tin
      - CNTT

  - synonym: THPTQG
    examples: |
      - thptqg
      - diem thi thpt
      - thpt

  - synonym: DGNL
    examples: |
      - danh gia nang luc

  - synonym: IELTS
    examples: |
      - ielts/sat
      - sat