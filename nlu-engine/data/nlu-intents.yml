version: "3.1"
nlu:
  - intent: greet
    examples: |
      - xin chao
      - chao ban
      - hello
      - em can tu van tuyen sinh
  - intent: affirm
    examples: |
      - co
      - dong y
      - tiep tuc
      - ok

  - intent: restart
    examples: |
      - bat dau lai
      - minh muon tu van lai tu dau
      - quay lai tu dau

  - intent: goodbye
    examples: |
      - tam biet
      - bye
      - cam on ban
      - hen gap lai

  - intent: nlu_fallback
    examples: |
      - asdfgh
      - ???
      - abc xyz
