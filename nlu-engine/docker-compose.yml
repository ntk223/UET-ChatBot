version: '3.8'

services:
  postgres_flowchart:
    image: postgres:15-alpine
    container_name: pg_uet
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: uet_chatbot
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis_state_store:
    image: redis:7-alpine
    container_name: redis_uet
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  redis_insight:
      image: redis/redisinsight:latest
      container_name: redis_insight
      ports:
        - "5540:5540"
      volumes:
        - redis_insight_data:/data
      depends_on:
        - redis_state_store
volumes:
  pg_data:
  redis_data:
  redis_insight_data: