version: "3.1"

stories:

# ==========================
# TEST 1 - GREETING
# ==========================
- story: test greet
  steps:
    - user: |
        xin chào
      intent: greet
    - action: utter_greet

# ==========================
# TEST 2 - HỎI HỌC PHÍ
# ==========================
- story: test tuition
  steps:
    - user: |
        học phí trường là bao nhiêu
      intent: hoi_hoc_phi
    - action: utter_tuition_info

# ==========================
# TEST 3 - HỎI THÔNG TIN NGÀNH
# ==========================
- story: test major information
  steps:
    - intent: hoi_thong_tin_nganh
      entities:
        - nganh_hoc: "Khoa học máy tính"
    - action: action_query_major_info

# ==========================
# TEST 4 - HỎI ĐIỂM CHUẨN
# ==========================
- story: test benchmark
  steps:
    - intent: hoi_diem_chuan_nganh
      entities:
        - nganh_hoc: "Công nghệ thông tin"
    - action: action_query_benchmark_by_major

# ==========================
# TEST 5 - HỌC PHÍ THEO NGÀNH
# ==========================
- story: test tuition by major
  steps:
    - intent: hoi_hoc_phi_theo_nganh
      entities:
        - nganh_hoc: "Trí tuệ nhân tạo"
    - action: action_query_tuition_by_major


# ==========================
# TEST 6 - FORM THPTQG
# ==========================
- story: test thptqg form
  steps:
    - user: |
        đăng ký nguyện vọng
      intent: dang_ky_nguyen_vong

    - action: utter_ask_method

    - user: |
        xét tuyển bằng điểm thi THPT
      intent: chon_ptxt_thptqg

    - action: thptqg_form

    - active_loop: thptqg_form

    - active_loop: null

    - slot_was_set:
        - requested_slot: null

    - action: action_submit_thptqg_form

# ==========================
# TEST 7 - FORM HSA
# ==========================
- story: test hsa form
  steps:
    - user: |
        đăng ký nguyện vọng
      intent: dang_ky_nguyen_vong

    - action: utter_ask_method

    - user: |
        xét tuyển HSA
      intent: chon_ptxt_hsa

    - action: hsa_form

    - active_loop: hsa_form

    - active_loop: null

    - slot_was_set:
        - requested_slot: null

    - action: action_submit_hsa_form

# ==========================
# TEST 8 - FORM IELTS
# ==========================
- story: test ielts form
  steps:
    - user: |
        đăng ký nguyện vọng
      intent: dang_ky_nguyen_vong

    - action: utter_ask_method

    - user: |
        xét tuyển IELTS
      intent: chon_ptxt_ielts

    - action: ielts_form

    - active_loop: ielts_form

    - active_loop: null

    - slot_was_set:
        - requested_slot: null

    - action: action_submit_ielts_form

# ==========================
# TEST 9 - FORM TUYỂN THẲNG
# ==========================
- story: test direct form
  steps:
    - user: |
        đăng ký nguyện vọng
      intent: dang_ky_nguyen_vong

    - action: utter_ask_method

    - user: |
        xét tuyển thẳng
      intent: chon_ptxt_tuyen_thang

    - action: direct_form

    - active_loop: direct_form

    - active_loop: null

    - slot_was_set:
        - requested_slot: null

    - action: action_submit_direct_form

# ==========================
# TEST 10 - HỦY FORM
# ==========================
- story: test cancel form
  steps:
    - user: |
        đăng ký nguyện vọng
      intent: dang_ky_nguyen_vong

    - action: utter_ask_method

    - user: |
        xét tuyển HSA
      intent: chon_ptxt_hsa

    - action: hsa_form

    - active_loop: hsa_form

    - user: |
        hủy
      intent: cancel

    - action: action_cancel_flow

    - active_loop: null

# ==========================
# TEST 11 - GIỮ NGỮ CẢNH NGÀNH HỌC
# ==========================
- story: test context retention
  steps:
    - intent: hoi_thong_tin_nganh
      entities:
        - nganh_hoc: "Khoa học máy tính"
    - action: action_query_major_info
    - intent: hoi_hoc_phi_theo_nganh
    - action: action_query_tuition_by_major

# ==========================
# TEST 12 - HỎI ĐIỂM CHUẨN SAU KHI HỎI NGÀNH
# ==========================
- story: test context benchmark
  steps:
    - intent: hoi_thong_tin_nganh
      entities:
        - nganh_hoc: "Trí tuệ nhân tạo"
    - action: action_query_major_info
    - intent: hoi_diem_chuan_nganh
    - action: action_query_benchmark_by_major